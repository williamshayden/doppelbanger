name: Bug report
description: Report a reproducible doppelbanger defect
title: "[Bug]: "
labels: ["bug", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Do not attach proprietary audio, unreleased music, credentials, private business information, or security vulnerability details. Use a minimal generated or redistributable fixture.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: State what happened and include the exact error.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Provide ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Validation evidence
      description: Include versions, sanitized logs, fixture provenance, and any measured result.
    validations:
      required: true
  - type: checkboxes
    id: public-data
    attributes:
      label: Public data confirmation
      options:
        - label: I have not included proprietary audio, credentials, or private vulnerability details.
          required: true
