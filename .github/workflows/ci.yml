name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Reject whitespace errors
        run: git diff --check
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all-targets
      - name: Native C and C++ ABI smoke
        run: bash scripts/test_native_ffi.sh
      - name: Validate Compose
        run: docker compose config

  platform:
    name: Rust contracts (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        run: cargo test --all-targets

  api-integration:
    name: PostgREST pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Start local state plane
        run: docker compose up -d --wait
      - name: Run API integration
        run: cargo test --test api_integration -- --ignored --test-threads=1
      - name: Capture service logs
        if: failure()
        run: docker compose logs --no-color
      - name: Stop local state plane
        if: always()
        run: docker compose down -v
